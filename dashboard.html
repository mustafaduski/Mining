<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MINING ⛏️ · dashboard</title>
  <!-- same modern sans‑serif font as login -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ----- RESET & BASE (identical to login) ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      background-color: #1a1b2f;               /* deep dark navy/purple */
      color: white;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    /* ----- BACKGROUND SHAPES (same as login) ----- */
    .bg-shapes {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .pill {
      position: absolute;
      background: #151628;
      border-radius: 999px;
      transform: rotate(-45deg);
    }

    .pill-1 {
      width: 700px;
      height: 160px;
      left: -200px;
      top: 15%;
      opacity: 0.5;
    }

    .pill-2 {
      width: 550px;
      height: 140px;
      right: -180px;
      bottom: 10%;
      opacity: 0.45;
    }

    .pill-3 {
      width: 400px;
      height: 100px;
      left: 25%;
      top: 70%;
      opacity: 0.4;
    }

    .cross {
      position: absolute;
      color: rgba(255, 255, 255, 0.12);
      font-size: 2rem;
      font-weight: 300;
      user-select: none;
      line-height: 1;
    }

    .cross-1 { top: 12%; left: 8%; font-size: 2.2rem; opacity: 0.2; transform: rotate(5deg); }
    .cross-2 { bottom: 18%; right: 12%; font-size: 3rem; opacity: 0.15; transform: rotate(-3deg); }
    .cross-3 { top: 40%; left: 85%; font-size: 2.5rem; opacity: 0.18; transform: rotate(10deg); }
    .cross-4 { top: 75%; left: 15%; font-size: 1.8rem; opacity: 0.25; transform: rotate(-5deg); }
    .cross-5 { top: 20%; left: 50%; font-size: 2rem; opacity: 0.15; transform: translateX(-50%) rotate(2deg); }
    .cross-6 { bottom: 30%; left: 7%; font-size: 2.6rem; opacity: 0.12; transform: rotate(-8deg); }

    /* main content (above background) */
    .content {
      position: relative;
      z-index: 5;
      flex: 1;
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
    }

    /* ----- HEADER with logo and logout ----- */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3rem;
    }

    .logo {
      font-size: 2.5rem;
      font-weight: 700;
      color: white;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .logo span {
      font-size: 2.3rem;
    }

    .logout-btn {
      background: transparent;
      border: 2px solid #ff4d4d;
      color: #ff4d4d;
      font-weight: 600;
      font-size: 0.9rem;
      padding: 0.5rem 1.5rem;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .logout-btn:hover {
      background: #ff4d4d;
      color: white;
      transform: scale(1.02);
    }

    /* welcome message */
    .welcome {
      font-size: 1.3rem;
      font-weight: 400;
      color: #cacdee;
      margin-bottom: 1rem;
    }
    .welcome strong {
      color: white;
      font-weight: 600;
    }

    /* ----- BALANCE CARD (glowing) ----- */
    .balance-card {
      background-color: #222436;
      border-radius: 2rem;
      padding: 2.5rem 2rem;
      box-shadow: 0 30px 50px -12px rgba(0,0,0,0.7);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 2rem;
      border: 1px solid #32354a;
    }

    .balance-label {
      font-size: 1.2rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: #a6a9c9;
      margin-bottom: 1rem;
    }

    .balance-amount {
      font-size: 4.5rem;
      font-weight: 700;
      color: white;
      text-shadow: 0 0 20px #3b82f6, 0 0 40px #1e3a8a, 0 0 60px #3b82f6;
      letter-spacing: 4px;
      line-height: 1.2;
    }

    .balance-unit {
      font-size: 2rem;
      font-weight: 400;
      color: #a6a9c9;
      margin-left: 0.8rem;
    }

    /* mining animation (glowing pulse + subtle rotation) */
    .mining-indicator {
      margin-top: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      background: #32354a;
      padding: 0.8rem 2rem;
      border-radius: 60px;
    }

    .pulse {
      width: 16px;
      height: 16px;
      background-color: #3b82f6;
      border-radius: 50%;
      box-shadow: 0 0 15px #3b82f6;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.4); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }

    .mining-text {
      color: #cacdee;
      font-size: 1rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* optional rotating pickaxe / gear (extra touch) */
    .rotate-icon {
      display: inline-block;
      font-size: 1.5rem;
      animation: rotate 4s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* responsive */
    @media (max-width: 600px) {
      .balance-amount {
        font-size: 3rem;
      }
      .balance-unit {
        font-size: 1.5rem;
      }
      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;
      }
    }
  </style>
</head>
<body>
  <!-- background shapes (exactly as login) -->
  <div class="bg-shapes">
    <div class="pill pill-1"></div>
    <div class="pill pill-2"></div>
    <div class="pill pill-3"></div>
    <div class="cross cross-1">+</div>
    <div class="cross cross-2">+</div>
    <div class="cross cross-3">+</div>
    <div class="cross cross-4">+</div>
    <div class="cross cross-5">+</div>
    <div class="cross cross-6">+</div>
  </div>

  <div class="content">
    <!-- header with logo and logout -->
    <div class="header">
      <div class="logo">
        MINING <span>⛏️</span>
      </div>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>

    <!-- dynamic welcome (filled by JS) -->
    <div class="welcome" id="welcomeMessage">Welcome, <strong>Miner</strong></div>

    <!-- main balance card -->
    <div class="balance-card">
      <div class="balance-label">Total Mined Balance</div>
      <div>
        <span class="balance-amount" id="balance">0.00000000</span>
        <span class="balance-unit">BTC</span>
      </div>

      <!-- mining animation (pulsing + rotating pickaxe) -->
      <div class="mining-indicator">
        <span class="pulse"></span>
        <span class="mining-text">Mining active</span>
        <span class="rotate-icon">⛏️</span>
      </div>
    </div>
  </div>

  <!-- Firebase Modular SDK (v10) -->
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"
      }
    }
  </script>

  <script type="module">
    import { initializeApp } from 'firebase/app';
    import { getAuth, signOut, onAuthStateChanged } from 'firebase/auth';

    // Your exact Firebase configuration (from login page)
    const firebaseConfig = {
      apiKey: "AIzaSyDyQziVzc3l5VQvVqUAjLJsPl9cZHcZXJE",
      authDomain: "crypto-exchange-iqd-d82b8.firebaseapp.com",
      projectId: "crypto-exchange-iqd-d82b8",
      storageBucket: "crypto-exchange-iqd-d82b8.firebasestorage.app",
      messagingSenderId: "447767305947",
      appId: "1:447767305947:web:25a31bbb8e0d477405b6fe",
      measurementId: "G-FDKQTKRM9N"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // DOM elements
    const welcomeEl = document.getElementById('welcomeMessage');
    const balanceEl = document.getElementById('balance');
    const logoutBtn = document.getElementById('logoutBtn');

    // ---------- Auth state check ----------
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        // Not logged in → redirect to login page (index.html)
        window.location.href = 'index.html';
        return;
      }
      // Display user name (prefer displayName, fallback to email)
      let displayName = 'Miner';
      if (user.displayName) {
        displayName = user.displayName;
      } else if (user.email) {
        // Use part before @
        displayName = user.email.split('@')[0];
      }
      welcomeEl.innerHTML = `Welcome, <strong>${displayName}</strong>`;
    });

    // ---------- Logout ----------
    logoutBtn.addEventListener('click', async () => {
      try {
        await signOut(auth);
        // onAuthStateChanged will redirect to index.html
      } catch (error) {
        console.error('Logout error:', error);
        alert('Logout failed. Please try again.');
      }
    });

    // ---------- Real-time mining counter ----------
    let balance = 0.0; // in BTC

    function updateBalanceDisplay() {
      // format to 8 decimal places
      balanceEl.textContent = balance.toFixed(8);
    }

    // Increase by 0.00000001 BTC every second
    setInterval(() => {
      balance += 0.00000001;
      updateBalanceDisplay();
    }, 1000);

    // Initial display
    updateBalanceDisplay();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>MINING ⛏️ · crypto wallet</title>
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts for clean typography -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #0f0c29 0%, #302b63 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
    }

    /* glassmorphism container */
    .glass-container {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 2.5rem;
      padding: 2.2rem 1.8rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      transition: opacity 0.3s ease;
    }

    /* sections toggled by auth */
    .section {
      display: none;
    }
    .section.active {
      display: block;
    }

    /* headings */
    .logo {
      font-size: 2.2rem;
      font-weight: 700;
      color: white;
      text-align: center;
      margin-bottom: 1.8rem;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }
    .logo i {
      margin-right: 8px;
      color: #ffd966;
    }

    /* login form */
    .input-group {
      margin-bottom: 1.25rem;
    }
    .input-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 0.3rem;
      margin-left: 0.5rem;
    }
    .input-field {
      width: 100%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 40px;
      padding: 1rem 1.5rem;
      font-size: 1rem;
      color: white;
      outline: none;
      transition: 0.2s;
    }
    .input-field:focus {
      border-color: #a688ff;
      background: rgba(255,255,255,0.15);
    }
    .input-field::placeholder {
      color: rgba(255,255,255,0.4);
      font-weight: 300;
    }

    .login-btn {
      width: 100%;
      background: white;
      border: none;
      border-radius: 50px;
      padding: 1rem;
      font-weight: 700;
      font-size: 1.1rem;
      color: #0f0c29;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      margin: 1.5rem 0 1rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 10px 20px -5px rgba(0,0,0,0.5);
    }
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 30px -5px rgba(0,0,0,0.6);
    }

    .google-btn {
      width: 100%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 50px;
      padding: 0.9rem;
      font-weight: 600;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .google-btn:hover {
      background: rgba(255,255,255,0.2);
    }
    .google-btn i {
      font-size: 1.3rem;
    }

    .separator {
      display: flex;
      align-items: center;
      gap: 1rem;
      color: rgba(255,255,255,0.4);
      font-size: 0.8rem;
      margin: 1.5rem 0;
    }
    .separator-line {
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.2);
    }

    .error-message {
      color: #ffb0b0;
      background: rgba(200, 60, 60, 0.3);
      border-left: 4px solid #ff5e5e;
      padding: 0.8rem;
      border-radius: 12px;
      font-size: 0.85rem;
      margin-top: 1rem;
      display: none;
    }
    .error-message.show {
      display: block;
    }

    /* dashboard */
    .user-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }
    .user-greeting {
      color: white;
      font-size: 1.1rem;
      background: rgba(255,255,255,0.1);
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .user-greeting i {
      margin-right: 6px;
      color: #ffd966;
    }
    .logout-btn {
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.3);
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
      transition: 0.2s;
    }
    .logout-btn:hover {
      background: rgba(255,255,255,0.2);
      border-color: #ff8a8a;
    }

    /* glowing circular progress around balance */
    .balance-container {
      position: relative;
      width: 220px;
      height: 220px;
      margin: 1.5rem auto 2rem;
    }
    .circular-progress {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: conic-gradient(#a688ff 0deg, #a688ff 0deg, rgba(255,255,255,0.1) 0deg);
      box-shadow: 0 0 30px #9d7aff, 0 0 60px #6b4eff;
      transition: background 0.1s;
    }
    .balance-inner {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      bottom: 10px;
      background: #0f0c29;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(255,255,255,0.2);
    }
    .balance-label {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .balance-amount {
      font-size: 2rem;
      font-weight: 700;
      color: white;
      line-height: 1.2;
    }
    .balance-unit {
      font-size: 0.9rem;
      color: #a688ff;
      margin-left: 4px;
    }

    /* mining status */
    .mining-status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 60px;
      padding: 0.8rem 1.5rem;
      margin: 2rem 0 0.5rem;
    }
    .pulse-green {
      width: 14px;
      height: 14px;
      background: #2ecc71;
      border-radius: 50%;
      box-shadow: 0 0 15px #2ecc71;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.2); }
      100% { opacity: 1; transform: scale(1); }
    }
    .mining-text {
      color: white;
      font-weight: 600;
    }

    /* extra icons */
    .wallet-icon {
      color: #f1c40f;
      margin-right: 5px;
    }
  </style>
</head>
<body>
  <div class="glass-container">
    <!-- LOGIN SECTION -->
    <div id="loginSection" class="section active">
      <div class="logo">
        <i class="fas fa-hard-hat"></i> MINING ⛏️
      </div>
      <div class="input-group">
        <div class="input-label"><i class="far fa-envelope"></i> Email</div>
        <input type="email" class="input-field" id="emailInput" placeholder="hello@miner.com" autocomplete="email">
      </div>
      <div class="input-group">
        <div class="input-label"><i class="fas fa-lock"></i> Password</div>
        <input type="password" class="input-field" id="passwordInput" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="login-btn" id="emailLoginBtn">
        <i class="fas fa-arrow-right"></i> LOG IN / SIGN UP
      </button>

      <div class="separator">
        <span class="separator-line"></span>
        <span>OR</span>
        <span class="separator-line"></span>
      </div>

      <button class="google-btn" id="googleLoginBtn">
        <i class="fab fa-google"></i> Continue with Google
      </button>

      <div class="error-message" id="errorMessage"></div>
    </div>

    <!-- DASHBOARD SECTION -->
    <div id="dashboardSection" class="section">
      <div class="user-header">
        <span class="user-greeting"><i class="fas fa-user-astronaut"></i> <span id="userName">Miner</span></span>
        <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
      </div>

      <!-- glowing circular balance -->
      <div class="balance-container">
        <div class="circular-progress" id="progressRing"></div>
        <div class="balance-inner">
          <span class="balance-label"><i class="fas fa-coins wallet-icon"></i> BALANCE</span>
          <span class="balance-amount" id="balanceDisplay">0.00000000</span>
          <span class="balance-unit">BTC</span>
        </div>
      </div>

      <!-- mining status -->
      <div class="mining-status">
        <span class="pulse-green"></span>
        <span class="mining-text">Mining Active</span>
        <i class="fas fa-microchip"></i>
      </div>
    </div>
  </div>

  <!-- Firebase Modular SDK (v10) -->
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"
      }
    }
  </script>

  <script type="module">
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from 'firebase/auth';

    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDyQziVzc3l5VQvVqUAjLJsPl9cZHcZXJE",
      authDomain: "crypto-exchange-iqd-d82b8.firebaseapp.com",
      projectId: "crypto-exchange-iqd-d82b8",
      storageBucket: "crypto-exchange-iqd-d82b8.firebasestorage.app",
      messagingSenderId: "447767305947",
      appId: "1:447767305947:web:25a31bbb8e0d477405b6fe"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // DOM elements
    const loginSection = document.getElementById('loginSection');
    const dashboardSection = document.getElementById('dashboardSection');
    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const emailLoginBtn = document.getElementById('emailLoginBtn');
    const googleLoginBtn = document.getElementById('googleLoginBtn');
    const errorDiv = document.getElementById('errorMessage');
    const userNameSpan = document.getElementById('userName');
    const balanceDisplay = document.getElementById('balanceDisplay');
    const logoutBtn = document.getElementById('logoutBtn');
    const progressRing = document.getElementById('progressRing');

    // Helper: show error
    const showError = (msg) => {
      errorDiv.textContent = msg;
      errorDiv.classList.add('show');
    };
    const clearError = () => {
      errorDiv.textContent = '';
      errorDiv.classList.remove('show');
    };

    // Toggle UI based on auth state
    onAuthStateChanged(auth, (user) => {
      if (user) {
        // User logged in → show dashboard
        loginSection.classList.remove('active');
        dashboardSection.classList.add('active');
        // Display user name
        const displayName = user.displayName || (user.email ? user.email.split('@')[0] : 'Miner');
        userNameSpan.textContent = displayName;
      } else {
        // No user → show login
        dashboardSection.classList.remove('active');
        loginSection.classList.add('active');
        clearError();
      }
    });

    // ---------- Email/Password login with auto sign-up ----------
    async function handleEmailLogin(email, password) {
      if (!email || !password) {
        showError('Email and password are required.');
        return;
      }
      clearError();

      try {
        // Try to sign in
        await signInWithEmailAndPassword(auth, email, password);
      } catch (signInErr) {
        // If user not found or invalid credential (likely wrong password), attempt creation
        if (signInErr.code === 'auth/user-not-found' || signInErr.code === 'auth/invalid-credential') {
          try {
            await createUserWithEmailAndPassword(auth, email, password);
            // creation successful → user is now signed in, onAuthStateChanged will update UI
          } catch (createErr) {
            // Handle creation errors
            if (createErr.code === 'auth/weak-password') showError('Password must be at least 6 characters.');
            else if (createErr.code === 'auth/invalid-email') showError('Invalid email address.');
            else if (createErr.code === 'auth/email-already-in-use') showError('Email already in use. Try logging in.');
            else showError(createErr.message);
          }
        } else {
          // Other sign-in errors
          if (signInErr.code === 'auth/wrong-password') showError('Wrong password.');
          else if (signInErr.code === 'auth/too-many-requests') showError('Too many attempts. Try later.');
          else showError(signInErr.message);
        }
      }
    }

    // ---------- Google Sign-In ----------
    async function handleGoogleSignIn() {
      clearError();
      try {
        const provider = new GoogleAuthProvider();
        await signInWithPopup(auth, provider);
      } catch (err) {
        if (err.code === 'auth/popup-closed-by-user') {
          showError('Popup closed. Try again.');
        } else {
          showError(err.message);
        }
      }
    }

    // ---------- Logout ----------
    logoutBtn.addEventListener('click', async () => {
      try {
        await signOut(auth);
      } catch (err) {
        alert('Logout error: ' + err.message);
      }
    });

    // Event listeners
    emailLoginBtn.addEventListener('click', (e) => {
      e.preventDefault();
      handleEmailLogin(emailInput.value.trim(), passwordInput.value);
    });

    googleLoginBtn.addEventListener('click', (e) => {
      e.preventDefault();
      handleGoogleSignIn();
    });

    // Enter key on inputs
    [emailInput, passwordInput].forEach(input => {
      input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') emailLoginBtn.click();
      });
    });

    // ---------- Live Mining Counter (increases every second) ----------
    let balance = 0.0; // in BTC
    const INCREMENT = 0.00000005;
    const CYCLE = 0.000001; // 1e-6 BTC – the ring fills one full turn per 0.000001 BTC

    function updateBalanceDisplay() {
      balanceDisplay.textContent = balance.toFixed(8);
      // Update circular progress: angle based on fractional part of balance modulo CYCLE
      const fractional = balance % CYCLE;
      const progress = fractional / CYCLE; // 0..1
      const angle = progress * 360;
      progressRing.style.background = `conic-gradient(#a688ff ${angle}deg, rgba(255,255,255,0.1) ${angle}deg)`;
    }

    setInterval(() => {
      balance += INCREMENT;
      updateBalanceDisplay();
    }, 1000);

    // initial display
    updateBalanceDisplay();
  </script>
</body>
</html>

<script type="module">
  import { initializeApp } from 'firebase/app';
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from 'firebase/auth';

  const firebaseConfig = {
    apiKey: "AIzaSyDyQziVzc3l5VQvVqUAjLJsPl9cZHcZXJE",
    authDomain: "crypto-exchange-iqd-d82b8.firebaseapp.com",
    projectId: "crypto-exchange-iqd-d82b8",
    storageBucket: "crypto-exchange-iqd-d82b8.firebasestorage.app",
    messagingSenderId: "447767305947",
    appId: "1:447767305947:web:25a31bbb8e0d477405b6fe",
    measurementId: "G-FDKQTKRM9N"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // DOM elements
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const loginBtn = document.getElementById('loginButton');
  const googleBtn = document.getElementById('googleSignInBtn');
  const errorDiv = document.getElementById('errorMessage');
  const forgotLink = document.getElementById('forgotLink');

  const showError = (msg) => { errorDiv.textContent = msg; errorDiv.classList.add('show'); };
  const clearError = () => { errorDiv.textContent = ''; errorDiv.classList.remove('show'); };

  // ---------- Email/Password with auto‑creation ----------
  async function handleEmailLogin(email, password) {
    if (!email || !password) {
      showError('Email and password are required.');
      return;
    }
    clearError();

    try {
      // 1. Try to sign in
      await signInWithEmailAndPassword(auth, email, password);
      window.location.href = 'dashboard.html';
    } catch (signInError) {
      // 2. If user doesn't exist OR credentials are completely invalid,
      //    attempt to create a new account.
      if (signInError.code === 'auth/user-not-found' || signInError.code === 'auth/invalid-credential') {
        try {
          await createUserWithEmailAndPassword(auth, email, password);
          window.location.href = 'dashboard.html';
        } catch (signUpError) {
          // Handle creation errors (weak password, invalid email, etc.)
          if (signUpError.code === 'auth/weak-password') {
            showError('Password must be at least 6 characters.');
          } else if (signUpError.code === 'auth/invalid-email') {
            showError('Invalid email address.');
          } else if (signUpError.code === 'auth/email-already-in-use') {
            showError('Email already in use. Please try logging in.');
          } else {
            showError(signUpError.message);
          }
        }
      } else {
        // Other sign-in errors (wrong password, too many requests, etc.)
        if (signInError.code === 'auth/wrong-password') {
          showError('Wrong password.');
        } else if (signInError.code === 'auth/too-many-requests') {
          showError('Too many attempts. Try later.');
        } else {
          showError(signInError.message);
        }
      }
    }
  }

  // ---------- Google Sign-In ----------
  async function handleGoogleSignIn() {
    clearError();
    try {
      const provider = new GoogleAuthProvider();
      await signInWithPopup(auth, provider);
      window.location.href = 'dashboard.html';
    } catch (err) {
      if (err.code === 'auth/popup-closed-by-user') {
        showError('Popup closed. Try again.');
      } else {
        showError(err.message);
      }
    }
  }

  // Event listeners
  loginBtn.addEventListener('click', (e) => {
    e.preventDefault();
    handleEmailLogin(emailInput.value.trim(), passwordInput.value);
  });

  googleBtn.addEventListener('click', (e) => {
    e.preventDefault();
    handleGoogleSignIn();
  });

  [emailInput, passwordInput].forEach(input => {
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') loginBtn.click();
    });
  });

  forgotLink.addEventListener('click', (e) => {
    e.preventDefault();
    alert('Password reset can be implemented with sendPasswordResetEmail().');
  });
</script>

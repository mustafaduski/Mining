<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>MINING ⛏️ · sign in</title>
  <!-- modern sans‑serif font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      background-color: #1a1b2f;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow-x: hidden;
      padding: 1.5rem;
    }

    /* background shapes */
    .bg-shapes {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .pill {
      position: absolute;
      background: #151628;
      border-radius: 999px;
      transform: rotate(-45deg);
    }

    .pill-1 { width: 700px; height: 160px; left: -200px; top: 15%; opacity: 0.5; }
    .pill-2 { width: 550px; height: 140px; right: -180px; bottom: 10%; opacity: 0.45; }
    .pill-3 { width: 400px; height: 100px; left: 25%; top: 70%; opacity: 0.4; }

    .cross {
      position: absolute;
      color: rgba(255, 255, 255, 0.12);
      font-size: 2rem;
      font-weight: 300;
      user-select: none;
    }
    .cross-1 { top: 12%; left: 8%; font-size: 2.2rem; opacity: 0.2; transform: rotate(5deg); }
    .cross-2 { bottom: 18%; right: 12%; font-size: 3rem; opacity: 0.15; transform: rotate(-3deg); }
    .cross-3 { top: 40%; left: 85%; font-size: 2.5rem; opacity: 0.18; transform: rotate(10deg); }
    .cross-4 { top: 75%; left: 15%; font-size: 1.8rem; opacity: 0.25; transform: rotate(-5deg); }
    .cross-5 { top: 20%; left: 50%; font-size: 2rem; opacity: 0.15; transform: translateX(-50%) rotate(2deg); }
    .cross-6 { bottom: 30%; left: 7%; font-size: 2.6rem; opacity: 0.12; transform: rotate(-8deg); }

    .content {
      position: relative;
      z-index: 5;
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo {
      font-size: 3rem;
      font-weight: 700;
      color: white;
      letter-spacing: -0.02em;
      margin-bottom: 2rem;
      text-shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .logo span { font-size: 2.8rem; }

    .card {
      background-color: #222436;
      border-radius: 0.75rem;
      box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.7);
      padding: 2.5rem;
      width: 100%;
    }

    .input-group {
      background-color: #32354a;
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      margin-bottom: 1.25rem;
      transition: background 0.15s, box-shadow 0.15s;
      text-align: left;
    }
    .input-group:focus-within {
      background-color: #3a3e55;
      box-shadow: 0 0 0 2px rgba(100, 140, 255, 0.3);
    }

    .input-label {
      display: block;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: #a6a9c9;
      text-transform: uppercase;
      margin-bottom: 0.2rem;
    }

    .input-field {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      font-size: 1rem;
      color: white;
      padding: 0.3rem 0 0.2rem;
    }
    .input-field::placeholder { color: #6f7390; opacity: 0.8; }

    .login-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      background: white;
      border: none;
      border-radius: 50px;
      padding: 1rem 2rem;
      margin: 1.5rem 0 0.5rem;
      cursor: pointer;
      transition: transform 0.25s, box-shadow 0.3s;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.4);
    }
    .login-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 30px -5px rgba(0, 0, 0, 0.6);
    }
    .btn-text {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: #1a1b2f;
    }
    .btn-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: #3b82f6;
      border-radius: 50%;
      width: 2.4rem;
      height: 2.4rem;
      color: white;
      font-size: 1.8rem;
      box-shadow: 0 4px 8px rgba(0, 80, 200, 0.4);
    }

    .error-message {
      color: #ffb3b3;
      background-color: #4f2d2d;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.6rem 1rem;
      border-radius: 0.5rem;
      margin: 1rem 0 0;
      text-align: center;
      border-left: 3px solid #ff5e5e;
      display: none;
    }
    .error-message.show { display: block; }

    .forgot-link {
      margin-top: 1rem;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #9b9dbb;
      text-decoration: underline;
      text-underline-offset: 4px;
    }
    .forgot-link:hover { color: #cacdee; }

    .separator {
      display: flex;
      align-items: center;
      margin: 1.8rem 0;
      color: #6f7390;
      font-size: 0.8rem;
      text-transform: uppercase;
    }
    .separator::before,
    .separator::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid #3f425c;
    }
    .separator::before { margin-right: 0.75rem; }
    .separator::after { margin-left: 0.75rem; }

    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      background: white;
      border: none;
      border-radius: 50px;
      padding: 0.8rem 1.5rem;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      gap: 0.8rem;
    }
    .google-btn:hover {
      background: #f5f5f5;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
    }
    .google-icon { width: 1.5rem; height: 1.5rem; }
    .google-btn span {
      font-size: 1rem;
      font-weight: 600;
      color: #3c4043;
    }

    @media (max-width: 480px) {
      .logo { font-size: 2.5rem; }
      .card { padding: 1.8rem; }
      .btn-text { font-size: 1rem; }
      .btn-icon { width: 2.2rem; height: 2.2rem; font-size: 1.6rem; }
    }
    .input-field { font-size: 16px; } /* iOS zoom fix */
  </style>
</head>
<body>
  <div class="bg-shapes">
    <div class="pill pill-1"></div>
    <div class="pill pill-2"></div>
    <div class="pill pill-3"></div>
    <div class="cross cross-1">+</div><div class="cross cross-2">+</div><div class="cross cross-3">+</div>
    <div class="cross cross-4">+</div><div class="cross cross-5">+</div><div class="cross cross-6">+</div>
  </div>

  <div class="content">
    <div class="logo">MINING <span>⛏️</span></div>
    <div class="card">
      <div class="input-group">
        <span class="input-label">EMAIL ADDRESS</span>
        <input class="input-field" type="email" id="email" placeholder="hello@samuelmay.co" autocomplete="email">
      </div>
      <div class="input-group">
        <span class="input-label">PASSWORD</span>
        <input class="input-field" type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button class="login-btn" id="loginButton">
        <span class="btn-text">LOG IN</span>
        <span class="btn-icon" aria-hidden="true">❯</span>
      </button>

      <div class="error-message" id="errorMessage"></div>
      <a href="#" class="forgot-link" id="forgotLink">FORGOT YOUR PASSWORD?</a>

      <div class="separator">OR</div>

      <button class="google-btn" id="googleSignInBtn">
        <svg class="google-icon" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        <span>Sign in with Google</span>
      </button>
    </div>
  </div>

  <!-- Firebase Modular SDK -->
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"
      }
    }
  </script>

  <script type="module">
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from 'firebase/auth';

    const firebaseConfig = {
      apiKey: "AIzaSyDyQziVzc3l5VQvVqUAjLJsPl9cZHcZXJE",
      authDomain: "crypto-exchange-iqd-d82b8.firebaseapp.com",
      projectId: "crypto-exchange-iqd-d82b8",
      storageBucket: "crypto-exchange-iqd-d82b8.firebasestorage.app",
      messagingSenderId: "447767305947",
      appId: "1:447767305947:web:25a31bbb8e0d477405b6fe",
      measurementId: "G-FDKQTKRM9N"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginButton');
    const googleBtn = document.getElementById('googleSignInBtn');
    const errorDiv = document.getElementById('errorMessage');
    const forgotLink = document.getElementById('forgotLink');

    const showError = (msg) => { errorDiv.textContent = msg; errorDiv.classList.add('show'); };
    const clearError = () => { errorDiv.textContent = ''; errorDiv.classList.remove('show'); };

    // Email/Password login with auto‑creation
    async function handleEmailLogin(email, password) {
      if (!email || !password) return showError('Email and password are required.');
      clearError();
      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = 'dashboard.html';
      } catch (err) {
        if (err.code === 'auth/user-not-found') {
          try {
            await createUserWithEmailAndPassword(auth, email, password);
            window.location.href = 'dashboard.html';
          } catch (createErr) {
            if (createErr.code === 'auth/weak-password') showError('Password must be at least 6 characters.');
            else if (createErr.code === 'auth/invalid-email') showError('Invalid email address.');
            else showError(createErr.message);
          }
        } else {
          if (err.code === 'auth/wrong-password') showError('Wrong password.');
          else if (err.code === 'auth/invalid-email') showError('Invalid email format.');
          else if (err.code === 'auth/too-many-requests') showError('Too many attempts. Try later.');
          else showError(err.message);
        }
      }
    }

    // Google Sign-In
    async function handleGoogleSignIn() {
      clearError();
      try {
        const provider = new GoogleAuthProvider();
        await signInWithPopup(auth, provider);
        window.location.href = 'dashboard.html';
      } catch (err) {
        if (err.code === 'auth/popup-closed-by-user') showError('Popup closed. Try again.');
        else showError(err.message);
      }
    }

    loginBtn.addEventListener('click', (e) => {
      e.preventDefault();
      handleEmailLogin(emailInput.value.trim(), passwordInput.value);
    });

    googleBtn.addEventListener('click', (e) => {
      e.preventDefault();
      handleGoogleSignIn();
    });

    [emailInput, passwordInput].forEach(input => {
      input.addEventListener('keypress', (e) => { if (e.key === 'Enter') loginBtn.click(); });
    });

    forgotLink.addEventListener('click', (e) => {
      e.preventDefault();
      alert('Password reset can be implemented with sendPasswordResetEmail().');
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ku">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINING ⛏️ - Premium</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="auth-container" class="container">
        <div class="glass-card">
            <div class="tabs">
                <span id="tab-login" class="tab active" onclick="switchTab('login')">SIGN IN</span>
                <span id="tab-signup" class="tab" onclick="switchTab('signup')">SIGN UP</span>
            </div>
            
            <div class="input-group">
                <label>EMAIL</label>
                <input type="email" id="email" placeholder="example@mail.com">
            </div>
            
            <div class="input-group">
                <label>PASSWORD</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <div class="options">
                <label><input type="checkbox" checked> Keep me Signed in</label>
            </div>

            <button id="main-btn" class="btn-primary" onclick="handleAuth()">SIGN IN</button>
            
            <div class="divider">OR</div>
            
            <button class="btn-google" onclick="googleLogin()">
                <img src="https://www.google.com/favicon.ico"> Sign in with Google
            </button>

            <p class="forgot-link" onclick="forgotPassword()">Forgot Password?</p>
        </div>
    </div>

    <div id="dashboard-container" class="container hidden">
        <div class="top-nav">
            <i class="fa-solid fa-bars"></i>
            <span class="logo">MINING ⛏️</span>
            <i class="fa-solid fa-user" onclick="logout()"></i>
        </div>

        <div class="main-card glass-card">
            <div class="mining-icon-container">
                <div class="glow-ring"></div>
                <i class="fa-solid fa-pickaxe mining-animate"></i>
            </div>
            <p class="balance-label">LIVE BALANCE (BTC)</p>
            <h1 id="btc-balance">0.00000000</h1>
            <button class="btn-action">BOOST SPEED <i class="fa-solid fa-bolt"></i></button>
        </div>

        <div class="stats-grid">
            <div class="stat-item glass-card">
                <i class="fa-solid fa-microchip"></i>
                <p>Hash Rate</p>
                <span>45.5 MH/s</span>
            </div>
            <div class="stat-item glass-card">
                <i class="fa-solid fa-link"></i>
                <p>Network</p>
                <span>Global</span>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active"><i class="fa-solid fa-house"></i></div>
            <div class="nav-item"><i class="fa-solid fa-wallet"></i></div>
            <div class="nav-item"><i class="fa-solid fa-chart-line"></i></div>
            <div class="nav-item"><i class="fa-solid fa-gear"></i></div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
